<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <rect width="1800" height="1100" fill="#f8fafc"/>
  <text x="900" y="60" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Complete AWS Infrastructure Diagram</text>

  <rect x="120" y="120" width="1560" height="900" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>

  <rect x="180" y="180" width="420" height="220" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="390" y="225" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">AWS VPC</text>
  <text x="390" y="260" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">Default VPC</text>
  <text x="390" y="285" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">CIDR: default</text>

  <rect x="240" y="430" width="300" height="140" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="390" y="475" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#166534">Public Subnets</text>
  <text x="390" y="505" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">Used by ALB and EC2</text>

  <rect x="620" y="430" width="300" height="140" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="770" y="475" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#92400e">Route Tables</text>
  <text x="770" y="505" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">Internet gateway routing</text>

  <rect x="1000" y="430" width="300" height="140" rx="16" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="1150" y="475" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#6d28d9">Security Groups</text>
  <text x="1150" y="505" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">ALB SG + EC2 SG</text>

  <rect x="240" y="660" width="320" height="180" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="705" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#b91c1c">Application Load Balancer</text>
  <text x="400" y="740" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">Public, internet-facing</text>
  <text x="400" y="770" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">Listener: port 80</text>

  <rect x="650" y="660" width="320" height="180" rx="18" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  <text x="810" y="705" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#115e59">Target Group</text>
  <text x="810" y="740" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">Routes to healthy instances</text>
  <text x="810" y="770" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">Port 80 / HTTP</text>

  <rect x="1080" y="660" width="320" height="180" rx="18" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="1240" y="705" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#5b21b6">Auto Scaling Group</text>
  <text x="1240" y="740" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">Desired: 2, Min: 2, Max: 4</text>
  <text x="1240" y="770" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">Uses launch template</text>

  <rect x="1080" y="880" width="320" height="100" rx="18" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="1240" y="925" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#b91c1c">EC2 Instances</text>
  <text x="1240" y="955" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">Apache HTTP Server</text>

  <rect x="180" y="900" width="900" height="70" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="630" y="940" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">Connection flow</text>
  <text x="630" y="970" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Client → Internet → ALB → Target Group → EC2 Auto Scaling instances</text>

  <line x1="600" y1="250" x2="240" y2="430" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="250" x2="620" y2="430" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="250" x2="1000" y2="430" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="400" y1="570" x2="400" y2="660" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="810" y1="570" x2="810" y2="660" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1240" y1="570" x2="1240" y2="660" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1240" y1="840" x2="1240" y2="880" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="640" y1="750" x2="650" y2="750" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="970" y1="750" x2="1080" y2="750" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
